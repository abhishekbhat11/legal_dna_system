version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env  
    #environment:
      # Pass your Gemini API key to the container!
    #  - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Mount the database file so data persists even if the container restarts
      - ./backend/legaldna.db:/app/legaldna.db

  frontend:
    build: ./frontend
    ports:
      # Map the Nginx port (80) to port 5173 on your machine
      - "5173:80"
    depends_on:
      - backend